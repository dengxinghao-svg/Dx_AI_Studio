<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dx_AI_Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../lib/styles/dashboard.css">
</head>
<body>
  <section class="workspace-dashboard" id="workspaceDashboard">
    <header class="workspace-dashboard__topbar">
      <div class="workspace-dashboard__brand">
        <div class="workspace-dashboard__logo"></div>
        <span>Dx_AI_Studio</span>
      </div>
      <nav class="workspace-dashboard__nav">
        <button class="workspace-dashboard__nav-link is-active" type="button">工作空间</button>
      </nav>
      <div class="workspace-dashboard__actions">
        <label class="workspace-dashboard__search">
          <span>⌕</span>
          <input id="projectSearchInput" type="text" placeholder="搜索项目">
        </label>
        <button class="workspace-dashboard__filter" id="projectFilterBtn" type="button">显示全部</button>
        <div class="workspace-dashboard__view-switch">
          <button class="workspace-dashboard__view-btn is-active" id="projectGridBtn" type="button" title="网格视图">▦</button>
          <button class="workspace-dashboard__view-btn" id="projectListBtn" type="button" title="列表视图">☰</button>
        </div>
        <button class="workspace-dashboard__icon-btn" id="languageToggleBtn" type="button" title="语言">CN</button>
        <button class="workspace-dashboard__new-btn" id="dashboardNewProjectBtn" type="button">+ 新建项目</button>
      </div>
    </header>

    <div class="workspace-dashboard__body">
      <div class="workspace-dashboard__tabs">
        <button class="workspace-dashboard__tab is-active" type="button">个人</button>
      </div>

      <section class="project-gallery" id="projectGallery">
        <article class="project-card project-card--create" data-project-action="new">
          <div class="project-card__create-icon">+</div>
          <div class="project-card__create-text">新建项目</div>
        </article>
      </section>
    </div>

    <div class="project-card-menu hidden" id="projectCardMenu">
      <button class="project-card-menu__item" data-action="open" type="button">打开</button>
      <button class="project-card-menu__item" data-action="rename" type="button">重命名</button>
      <button class="project-card-menu__item" data-action="move" type="button">移动至...</button>
      <button class="project-card-menu__item project-card-menu__item--danger" data-action="delete" type="button">删除</button>
    </div>

    <div class="language-menu hidden" id="languageMenu">
      <button class="language-menu__item" data-locale="en" type="button">English</button>
      <button class="language-menu__item is-active" data-locale="zh-CN" type="button">简体中文</button>
    </div>
  </section>

  <script src="../../lib/stores/project-store.js"></script>
  <script src="../../lib/scripts/dashboard.js"></script>
</body>
</html>
